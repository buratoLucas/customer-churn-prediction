<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Altan OS – Production Preview</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Syne:wght@500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f0f3f9; --panel: #fff; --panel-2: #f6f8fd; --text: #0d1830; --muted: #6b7d99;
      --line: #dce3f0; --primary: #4055f5; --primary-lt: #ecefff; --radius: 18px;
      --sidebar-w: 264px; --topbar-h: 66px;
    }
    *{box-sizing:border-box} body{margin:0;font-family:'DM Sans',system-ui,sans-serif;background:var(--bg);color:var(--text)}
    .sidebar{position:fixed;left:0;top:0;width:var(--sidebar-w);height:100vh;background:var(--panel);border-right:1px solid var(--line);padding:16px}
    .brand{font-family:'Syne',system-ui,sans-serif;font-size:28px;margin:0}
    .phase{display:inline-block;margin-top:10px;padding:6px 10px;border-radius:999px;background:var(--primary-lt);color:var(--primary);font-size:12px}
    .nav button{display:block;width:100%;text-align:left;border:0;background:transparent;padding:10px;border-radius:12px;margin-top:8px}
    .nav button.active{background:var(--primary-lt);color:var(--primary);font-weight:700}
    .topbar{position:fixed;left:var(--sidebar-w);right:0;top:0;height:var(--topbar-h);display:flex;align-items:center;justify-content:space-between;padding:0 24px;background:var(--panel);border-bottom:1px solid var(--line)}
    .topbar h2{font-family:'Syne',system-ui,sans-serif;margin:0}
    .container{margin-left:var(--sidebar-w);padding:92px 24px 24px}
    .grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:16px}
    .card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:16px;box-shadow:0 4px 24px rgba(12,22,55,.07)}
    .card .label{font-size:13px;color:var(--muted)} .card .value{font-family:'Syne',system-ui,sans-serif;font-size:30px;margin-top:8px}
    .fab{position:fixed;right:24px;bottom:24px;background:var(--primary);color:#fff;border:0;border-radius:999px;padding:12px 18px;font-weight:700}
  </style>
</head>
<body>
  <aside class="sidebar">
    <h1 class="brand">Altan OS</h1>
    <div class="phase">Phase: Baseline healthy cash flow</div>
    <nav class="nav">
      <button class="active">Dashboard</button>
      <button>Transactions</button>
      <button>Accounts</button>
      <button>Investments</button>
      <button>Calendar</button>
      <button>Reports</button>
      <button>Insights</button>
      <button>Settings</button>
    </nav>
  </aside>

  <header class="topbar">
    <h2>Life Operating System</h2>
    <button>Dark mode</button>
  </header>

  <main class="container">
    <h3 style="font-family:'Syne',system-ui,sans-serif;font-size:30px;margin:0 0 14px">Dashboard</h3>
    <section class="grid">
      <article class="card"><div class="label">Available cash</div><div class="value">£0.00</div></article>
      <article class="card"><div class="label">Monthly income</div><div class="value">£0.00</div></article>
      <article class="card"><div class="label">Monthly outflow</div><div class="value">£0.00</div></article>
      <article class="card"><div class="label">Debt pressure</div><div class="value">0%</div></article>
    </section>
  </main>

  <button class="fab">Atlas</button>
</body>
</html>
